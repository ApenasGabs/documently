services:
  # ── IA local (Ollama) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    env_file: .env
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1

    # ── GPU Nvidia (CUDA) ──────────────────────────────────────────
    # Comente este bloco se não tiver GPU Nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    # ── GPU AMD (ROCm) ─────────────────────────────────────────────
    # Descomente este bloco e comente o bloco Nvidia acima se tiver AMD
    # Requer: ROCm instalado no host (https://rocm.docs.amd.com)
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - video
    #   - render
    # environment:
    #   - HSA_OVERRIDE_GFX_VERSION=10.3.0   # ajuste para sua GPU (rdna2=10.3, rdna3=11.0)
    #   - OLLAMA_NUM_PARALLEL=1
    #   - OLLAMA_MAX_LOADED_MODELS=1

    # ── CPU only ───────────────────────────────────────────────────
    # Sem GPU? Comente todos os blocos acima e descomente:
    # runtime: runc

  # ── Setup: baixa o modelo definido no .env ────────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    env_file: .env
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull $OLLAMA_MODEL
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    volumes:
      - ollama_models:/root/.ollama

  # ── Analisador principal ───────────────────────────────────────────
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
    restart: "no"
    user: "${DOCKER_UID:-1000}:${DOCKER_GID:-1000}"
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - TELEMETRY_LOG_DIR=/output/logs
    volumes:
      - ./projects:/projects:ro
      - ./docs:/output/docs
      - ./status:/output/status
      - ./logs:/output/logs

volumes:
  ollama_models: