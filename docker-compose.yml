version: "3.9"

services:
  # ── IA local (Ollama) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama          # modelos persistem entre reinicializações
    environment:
      - OLLAMA_NUM_PARALLEL=1                # 1 request por vez (economiza RAM)
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Se não tiver GPU nvidia, comente o bloco "deploy" acima
    # e descomente a linha abaixo:
    # runtime: runc

  # ── Setup: baixa o modelo automaticamente ─────────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    container_name: ollama-setup
    depends_on:
      - ollama
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull qwen2.5-coder:3b
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ollama_models:/root/.ollama

  # ── Analisador principal ───────────────────────────────────────────
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    container_name: analyzer
    depends_on:
      - ollama
    restart: "no"                            # roda e para (não fica em loop infinito)
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-coder:3b
      - MAX_TOKENS_PER_CHUNK=3000
      - EXTENSIONS=.sol,.py,.js,.ts,.go,.rs  # extensões a analisar
    volumes:
      # Projetos lidos como read-only
      - ./projeto1:/projects:ro
      # Docs e status com escrita
      - ./docs:/output/docs
      - ./status:/output/status

volumes:
  ollama_models:
