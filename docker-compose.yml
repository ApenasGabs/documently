services:
  # ── IA local (Ollama) ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    env_file: .env
    environment:
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  # Sem GPU nvidia? Comente o bloco "deploy" acima.

  # ── Setup: baixa o modelo definido no .env ────────────────────────
  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    env_file: .env
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull $OLLAMA_MODEL
      "
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    volumes:
      - ollama_models:/root/.ollama

  # ── Analisador principal ───────────────────────────────────────────
  analyzer:
    build:
      context: ./analyzer
      dockerfile: Dockerfile
    depends_on:
      ollama-setup:
        condition: service_completed_successfully
    restart: "no"
    env_file: .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./projects:/projects:ro
      - ./docs:/output/docs
      - ./status:/output/status

volumes:
  ollama_models: